<!DOCTYPE html>
<html>

<head>
<title>Rainfall Prediction</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Chennai Rainfall Prediction System</h1>

<form action="/predict" method="post">

<label>Year</label><br>
<input 
type="number" 
name="year" 
required 
min="2000"
max="2025"
placeholder="Enter year (2000 - 2025)">
<br><br>

<label>Month</label><br>
<input 
type="number" 
name="month" 
min="1" 
max="12" 
required 
placeholder="Enter month like 8">
<br><br>

<label>Day</label><br>
<input 
type="number" 
name="day" 
min="1" 
max="31" 
required 
placeholder="Enter day like 25">
<br><br>

<button type="submit">Predict Rainfall</button>

</form>

<br>

{% if prediction %}

<h2>Predicted Rainfall: {{ prediction }} mm</h2><br>

<h2>Rainfall Trend Graph</h2>

<img src="/static/rainfall_plot.png" width="500">

{% endif %}

</body>
</html>
