<!DOCTYPE html>
<html>

<head>
<title>Rainfall Prediction</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Chennai Rainfall Prediction System</h1>

<form action="/predict" method="post">

<label>Year</label><br>
<input type="number" name="year" required><br><br>

<label>Month</label><br>
<input type="number" name="month" min="1" max="12" required><br><br>

<label>Day</label><br>
<input type="number" name="day" min="1" max="31" required><br><br>

<button type="submit">Predict Rainfall</button>

</form>

<br>

{% if prediction %}

<h2>Predicted Rainfall: {{ prediction }} mm</h2>

<h3>Rainfall Trend Graph</h3>

<img src="/static/rainfall_plot.png" width="500">

{% endif %}

</body>
</html>
